home:
  title: resmush | Optimize and compress image files with reSmush.it
  description: |
    Optimize and compress local and online image files from R with the
    reSmush.it API. Process individual files or entire directories. The API is
    free for personal use, accepts files smaller than 5 MB and supports PNG,
    JPEG, GIF, BMP and TIFF files.

